
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thank You | Signal Arc</title>
  <meta name="robots" content="noindex, follow">
  <meta name="description" content="Thanks for reaching out. Book a quick call with Signal Arc." />

  <!-- Optional: reuse your site fonts if you already have them -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg: #0e1620;
      --card: #112130;
      --text: #e9f0f6;
      --muted: rgba(233,240,246,.75);
      --accent: #4D917F;
      --accent2: #24594C;
      --border: rgba(233,240,246,.15);
    }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(77,145,127,.25), transparent 55%),
                  radial-gradient(900px 500px at 80% 20%, rgba(36,89,76,.25), transparent 55%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }
    .wrap{
      width: 100%;
      max-width: 820px;
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    h1{
      margin: 0 0 10px;
      font-size: 34px;
      letter-spacing: -0.02em;
    }
    p{
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 16px;
    }
    .cta-row{
      display:flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration:none;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255,255,255,.04);
      transition: transform .06s ease, background .2s ease;
    }
    .btn:hover{ background: rgba(255,255,255,.07); transform: translateY(-1px); }
    .btn.primary{
      background: linear-gradient(180deg, rgba(77,145,127,.95), rgba(36,89,76,.95));
      border-color: rgba(0,0,0,.15);
      color: #071412;
    }
    .fine{
      margin-top: 14px;
      font-size: 13px;
      color: rgba(233,240,246,.65);
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .brand{
      font-weight: 700;
      letter-spacing: .04em;
      opacity: .9;
    }
  </style>

  <!-- Note: auto-redirect removed so we can customize per type via query string below -->
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">SIGNAL ARC</div>
      <a class="btn" href="/" aria-label="Back to home">Back to site</a>
    </div>

    <div class="card">
      <h1 id="ty-title">Thanks — got it.</h1>
      <p id="ty-message">
        Your request is in. If you want the fastest turnaround, book a quick 30-minute call and we’ll map your goals to the right service.
      </p>

      <div class="cta-row">
        <a class="btn primary" id="ty-primary-cta" href="https://calendly.com/joshua_signalarc/30min" target="_blank" rel="noopener">
          Book a 30-min call
        </a>
        <a class="btn" href="mailto:joshua@signalarc.io">
          Email Joshua
        </a>
      </div>

      <p class="fine" id="ty-fine">
        If the calendar doesn’t open, click the button above or email joshua@signalarc.io.
      </p>
  <script>
    (function(){
      var params = new URLSearchParams(window.location.search);
      var type = params.get('type');
      if (type === 'assessment') {
        document.getElementById('ty-title').textContent = 'Payment received. Let\u2019s book your audit.';
        document.getElementById('ty-message').innerHTML =
          'Your <strong>$999 AI Assessment</strong> is confirmed \u2014 a Stripe receipt is on the way to your inbox.<br><br>' +
          '<strong>Next step:</strong> pick a 45-minute slot on Joshua\u2019s calendar. We\u2019ll do the live workflow audit, then you\u2019ll get your custom AI Action Plan within 48 hours.';
        document.getElementById('ty-primary-cta').textContent = 'Book my 45-min audit';
        document.getElementById('ty-fine').textContent =
          'Questions before the call? Email joshua@signalarc.io and we\u2019ll reply within one business day.';
      }
    })();
  </script>
